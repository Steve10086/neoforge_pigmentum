name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.changed }}
      new_version: ${{ steps.version_check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Check if mod_version changed
        id: version_check
        if: github.event_name == 'push'
        run: |
          NEW=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "version=${NEW}" >> $GITHUB_OUTPUT

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            OLD=$(git show HEAD~1:gradle.properties 2>/dev/null | grep '^mod_version=' | cut -d'=' -f2) || OLD=""
            echo "Old version: $OLD"
          else
            OLD=""
            echo "First commit on main"
          fi

          echo "New version: $NEW"

          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo ">>> Version changed: $OLD → $NEW <<<"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($NEW), skipping release."
          fi

      - name: Publish to Modrinth
        if: steps.version_check.outputs.changed == 'true'
        run: ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Upload JAR artifact
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: painter-jar
          path: build/libs/*.jar
          retention-days: 1

  release:
    needs: build
    if: needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: painter-jar
          path: build/libs/

      - name: Create Git tag
        run: |
          VERSION="${{ needs.build.outputs.new_version }}"
          TAG="v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.build.outputs.new_version }}"
          gh release create "v${VERSION}" \
            build/libs/*.jar \
            --title "Pigmentum v${VERSION}" \
            --generate-notes \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
